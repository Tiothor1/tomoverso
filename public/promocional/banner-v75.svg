    <text y="90" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#e4e4e7" letter-spacing="3">HISTÓRIA AQUI</text>
  </g>

  <g transform="translate(540, 950)" text-anchor="middle">
    <text font-family="Arial,sans-serif" font-size="18" fill="#a1a1aa">

  </defs>
  <rect width="1080" height="1920" fill="url(#bg75)"/>
  <ellipse cx="540" cy="0" rx="700" ry="500" fill="#ef4444" opacity="0.06"/>
  <circle cx="200" cy="1600" r="280" fill="none" stroke="#ef4444" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="880" cy="400" r="180" fill="none" stroke="#ef4444" stroke-opacity="0.03" stroke-width="1"/>

  <line x1="200" y1="100" x2="880" y2="100" stroke="url(#ac75)" stroke-width="2" stroke-opacity="0.25"/>


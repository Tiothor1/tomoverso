      <stop offset="0%" stop-color="#1a0f0e"/>
      <stop offset="50%" stop-color="#2d1815"/>
      <stop offset="100%" stop-color="#3d1f1a"/>
    </linearGradient>
    <linearGradient id="ac75" x1="0" y1="0" x2="1" y2="1">

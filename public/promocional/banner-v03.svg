  <rect x="240" y="1200" width="600" height="80" rx="40" fill="url(#ac3)" filter="url(#g3)"/>
  <text x="540" y="1250" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#0f0c29" text-anchor="middle" letter-spacing="2">COMEÇAR A LER</text>

  <rect x="290" y="1400" width="500" height="56" rx="28" fill="#18181b" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1.5"/>
  <text x="540" y="1435" font-family="monospace,Arial" font-size="24" font-weight="bold" fill="#a855f7" text-anchor="middle">tomoverso.studio</text>

  <line x1="200" y1="1820" x2="880" y2="1820" stroke="url(#ac3)" stroke-width="2" stroke-opacity="0.25"/>

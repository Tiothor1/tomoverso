  <rect x="240" y="830" width="600" height="80" rx="40" fill="url(#accent)"/>
  <text x="540" y="883" font-family="Arial,sans-serif" font-size="30" font-weight="bold" fill="#0f0c29" text-anchor="middle">PUBLICAR AGORA →</text>
  
  <text x="540" y="1000" font-family="monospace,Arial" font-size="22" font-weight="bold" fill="#f59e0b" text-anchor="middle">tomoverso.studio</text>

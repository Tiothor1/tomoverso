      <stop offset="100%" stop-color="#24243e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="1080" height="1080" fill="url(#bg)"/>
  <ellipse cx="540" cy="1080" rx="600" ry="400" fill="#f59e0b" opacity="0.06"/>
  
  <g transform="translate(540, 220)" text-anchor="middle">
    <rect x="-50" y="-50" width="100" height="100" rx="20" fill="url(#accent)" opacity="0.15"/>
    <text x="0" y="15" font-family="Georgia,serif" font-size="50" font-weight="bold" fill="url(#accent)">T</text>
  </g>
  <text x="540" y="330" font-family="Georgia,serif" font-size="36" font-weight="bold" fill="#e4e4e7" text-anchor="middle" letter-spacing="3">TOMO VERSO</text>
  <text x="540" y="365" font-family="Arial,sans-serif" font-size="15" fill="#71717a" text-anchor="middle" letter-spacing="6">EDITORA</text>
  
  <g transform="translate(540, 520)" text-anchor="middle">
    <text font-family="Arial,sans-serif" font-size="28" fill="#f59e0b" font-weight="bold">✍️ SUA HISTÓRIA</text>

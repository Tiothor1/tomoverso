  </defs>
  <rect width="1080" height="1920" fill="url(#bg6)"/>
  <ellipse cx="540" cy="0" rx="700" ry="500" fill="#38bdf8" opacity="0.06"/>
  <circle cx="200" cy="1600" r="280" fill="none" stroke="#38bdf8" stroke-opacity="0.04" stroke-width="1"/>
  <circle cx="880" cy="400" r="180" fill="none" stroke="#38bdf8" stroke-opacity="0.03" stroke-width="1"/>


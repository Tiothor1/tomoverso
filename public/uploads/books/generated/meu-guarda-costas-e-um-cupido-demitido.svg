<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Meu Guarda-Costas é um Cupido Demitido</title>
  <desc id="desc">Atriz adolescente com óculos escuros ao lado de cupido sem asas usando terno e arco luminoso quebrado.</desc>
  <defs>

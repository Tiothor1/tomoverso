<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">A Maldição do Segundo Protagonista</title>
  <desc id="desc">Garoto cercado por molduras de mangá quebradas, olhando para rival sorridente sob luz de palco.</desc>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">A Escola para Vilãs Arrependidas</title>
  <desc id="desc">Grupo de garotas vilãs em uniforme mágico diante de escola gótica colorida, com expressões travessas.</desc>
  <defs>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Rosas para a Garota Fantasma</title>
  <desc id="desc">Garoto com buquê de rosas vendo garota fantasma translúcida em cemitério florido ao pôr do sol.</desc>

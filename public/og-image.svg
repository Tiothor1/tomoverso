<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="50%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#240046"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(124,58,237,0.15)"/>
      <stop offset="100%" stop-color="rgba(124,58,237,0.05)"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(167,139,250,0.12)"/>
      <stop offset="100%" stop-color="rgba(167,139,250,0.03)"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(192,132,252,0.1)"/>
      <stop offset="100%" stop-color="rgba(192,132,252,0.02)"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.03" stroke="#a78bfa" stroke-width="1">
    <line x1="0" y1="126" x2="1200" y2="126"/>
    <line x1="0" y1="252" x2="1200" y2="252"/>
    <line x1="0" y1="378" x2="1200" y2="378"/>
    <line x1="0" y1="504" x2="1200" y2="504"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Decorative book/manga elements -->
  <g opacity="0.08">
    <!-- Book stack left -->
    <rect x="60" y="340" width="32" height="120" rx="2" fill="#7c3aed"/>
    <rect x="68" y="330" width="32" height="120" rx="2" fill="#a78bfa"/>
    <rect x="76" y="320" width="32" height="120" rx="2" fill="#c084fc"/>
    <!-- Book stack right -->
    <rect x="1092" y="320" width="32" height="130" rx="2" fill="#7c3aed"/>
    <rect x="1100" y="330" width="32" height="130" rx="2" fill="#a78bfa"/>
    <rect x="1108" y="340" width="32" height="130" rx="2" fill="#c084fc"/>
  </g>

  <!-- Content cards -->
  <g transform="translate(80, 420)">
    <rect width="320" height="160" rx="12" fill="url(#card1)" stroke="rgba(124,58,237,0.2)" stroke-width="1"/>
    <text x="20" y="36" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" font-weight="600">MANGÁS</text>
    <text x="20" y="62" font-family="system-ui, sans-serif" font-size="24" fill="#e2e8f0" font-weight="700">172+</text>
    <text x="20" y="84" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">títulos para ler agora</text>
    <text x="20" y="130" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Magic Emperor • Lookism • Blue Lock</text>
  </g>

  <g transform="translate(440, 420)">
    <rect width="320" height="160" rx="12" fill="url(#card2)" stroke="rgba(167,139,250,0.2)" stroke-width="1"/>
    <text x="20" y="36" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" font-weight="600">NOVELS</text>
    <text x="20" y="62" font-family="system-ui, sans-serif" font-size="24" fill="#e2e8f0" font-weight="700">52+</text>
    <text x="20" y="84" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">light novels brasileiras</text>
    <text x="20" y="130" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">Demon King • O Que Eu Desenhei, Existe</text>
  </g>

  <g transform="translate(800, 420)">
    <rect width="320" height="160" rx="12" fill="url(#card3)" stroke="rgba(192,132,252,0.2)" stroke-width="1"/>
    <text x="20" y="36" font-family="system-ui, sans-serif" font-size="13" fill="#a78bfa" font-weight="600">CAPÍTULOS</text>
    <text x="20" y="62" font-family="system-ui, sans-serif" font-size="24" fill="#e2e8f0" font-weight="700">20.500+</text>
    <text x="20" y="84" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">conteúdo traduzido e original</text>
    <text x="20" y="130" font-family="system-ui, sans-serif" font-size="14" fill="#64748b">novos capítulos toda semana</text>
  </g>

  <!-- Logo -->
  <g transform="translate(68, 65)">
    <circle cx="25" cy="25" r="22" fill="url(#accent)" opacity="0.9"/>
    <text x="25" y="33" font-family="Georgia, serif" font-size="26" fill="#fff" text-anchor="middle" font-weight="bold">T</text>
  </g>

  <!-- Title -->
  <text x="110" y="90" font-family="system-ui, sans-serif" font-size="38" fill="#f1f5f9" font-weight="800">Tomo Verso Editora</text>
  <text x="110" y="120" font-family="system-ui, sans-serif" font-size="18" fill="#a78bfa" font-weight="500">Onde histórias ganham vida</text>

  <!-- Hero text -->
  <text x="80" y="200" font-family="system-ui, sans-serif" font-size="48" fill="#e2e8f0" font-weight="800">Histórias que parecem</text>
  <text x="80" y="250" font-family="system-ui, sans-serif" font-size="48" fill="url(#accent)" font-weight="800">feitas para virar vício.<tspan fill="#e2e8f0" dx="0"> 🎮📖</tspan></text>
  <text x="80" y="300" font-family="system-ui, sans-serif" font-size="22" fill="#94a3b8" font-weight="400">Mangás, manhwas e light novels — em português, grátis e sem enrolação.</text>

  <!-- CTA badge -->
  <g transform="translate(80, 360)">
    <rect width="180" height="40" rx="20" fill="url(#accent)"/>
    <text x="90" y="26" font-family="system-ui, sans-serif" font-size="16" fill="#fff" text-anchor="middle" font-weight="700">Começar a ler →</text>
  </g>

  <!-- URL -->
  <text x="600" y="610" font-family="system-ui, sans-serif" font-size="16" fill="#64748b" text-anchor="middle">tomoverso.studio</text>
</svg>
